<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://www.dev.clientlog.bayis.co.uk">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% if page.title %}{{ page.title }} | Bay Information Systems{% else %}Bay Information Systems | AI/ML Consultancy{% endif %}</title>

  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}Bay Information Systems offers AI/ML consultancy and engineering services for startups and enterprises.{% endif %}">
  {% if page.keywords %}
  <meta name="keywords" content="{{ page.keywords | join: ', ' }}">
  {% endif %}
  <meta name="author" content="Bay Information Systems">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top" style="background-color: var(--dark-bg);">
  <div class="container">
    <a class="navbar-brand" href="/">
      <img src="/img/BayInfoLogo_narrow.png" alt="Bay Information Systems Logo" height="50">
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/#what-we-do">What We Do</a></li>
        <li class="nav-item"><a class="nav-link" href="/#ai-services">Services</a></li>
        <li class="nav-item"><a class="nav-link" href="/library">Articles</a></li>
        <li class="nav-item"><a class="nav-link" href="/#projects">Projects</a></li>
      </ul>
    </div>
  </div>
</nav>

{{ content }}

<footer class="section-dark">
  <div class="d-flex justify-content-center gap-4 mt-3">
    <img src="/img/BayInfoLogo_square.png" alt="Bay Information Systems Logo" height="50">
    <a href="https://uk.linkedin.com/company/bay-information-systems-ml" target="_blank"><i class="fa-brands fa-linkedin fa-3x" style="color: var(--light-bg);"></i></a>
    <a href="https://github.com/bayinfosys" target="_blank"><i class="fa-brands fa-github fa-3x" style="color: var(--light-bg);"></i></a>

    <a href="https://bayinformationsystems.substack.com/" target="_blank" rel="noopener">
      <img src="https://substack.com/img/substack.png"
           alt="Substack"
           style="height: 3.25rem; width: 3.25rem; object-fit: contain; filter: brightness(0) invert(1);">
    </a>
  </div>
  <p>&copy; 2026 Bay Information Systems. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.dev.clientlog.bayis.co.uk/clientlog.js"></script>
<script>
  const logger = clientlog.createLogger({
    endpoint: "https://api.dev.clientlog.bayis.co.uk/v1/event",
    project: "bayis/home",
    options: { session: true, navigation: true }
  });
</script>

</body>
</html>
